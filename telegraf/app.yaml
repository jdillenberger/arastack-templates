name: telegraf
description: System monitoring agent that publishes metrics to MQTT for Home Assistant
category: infra
version: "1.34"
ports: []
values:
  - name: mqtt_host
    description: MQTT broker hostname
    default: "homeassistant.local"
  - name: mqtt_port
    description: MQTT broker port
    default: "1883"
  - name: mqtt_username
    description: MQTT username
    default: "mqtt"
  - name: mqtt_password
    description: MQTT password
    secret: true
  - name: collect_interval
    description: Metrics collection interval
    default: "30s"
  - name: docker_gid
    description: "Docker socket group ID (stat -c '%g' /var/run/docker.sock)"
    default: ""
  - name: timezone
    description: Timezone
    validation: timezone
lint_ignore:
  - "secret-no-autogen:mqtt_password"
routing:
  enabled: false
dependencies:
  - docker
requirements:
  min_ram: 64M
  arch: [amd64, arm64]
