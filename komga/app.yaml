name: komga
description: Media server for comics, mangas, BDs, magazines and eBooks
category: media
version: "1.14.1"
ports:
  - host: 25600
    container: 25600
    protocol: tcp
    description: Web UI
    value_name: web_port
values:
  - name: web_port
    description: Web UI port
    default: "25600"
  - name: library_path
    description: Path to comic/manga library on host
  - name: timezone
    description: Timezone
    default: "UTC"
dependencies:
  - docker
volumes:
  - name: config
    container: /config
    description: Komga configuration and database
health_check:
  url: "http://localhost:{{.web_port}}/api/v1/actuator/health"
  interval: 30s
backup:
  paths:
    - config
requirements:
  min_ram: 512M
  arch: [amd64, arm64]
