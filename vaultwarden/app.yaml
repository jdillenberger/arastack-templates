name: vaultwarden
description: Bitwarden-compatible password manager
category: security
version: "1.35.4"
ports:
  - host: 8222
    container: 80
    protocol: tcp
    description: Web UI
    value_name: web_port
values:
  - name: web_port
    description: Web UI port
    default: "8222"
  - name: admin_token
    description: Admin panel token
    secret: true
    auto_gen: password
    user_facing: true
  - name: signups_allowed
    description: Allow new user signups
    default: "false"
  - name: timezone
    description: Timezone
    validation: timezone
dependencies:
  - docker
volumes:
  - name: data
    container: /data
    description: Vaultwarden data
health_check:
  url: "http://localhost:{{.web_port}}"
  interval: 30s
backup:
  paths:
    - data
post_deploy_info:
  access_url: "{{.routing_url}}"
  credentials: "Admin panel at /admin"
  notes:
    - "Create your account at the web UI, then use Bitwarden clients to connect"
    - "Admin panel is at /admin — use the admin token to log in"
requirements:
  min_ram: 128M
  arch: [amd64, arm64]
