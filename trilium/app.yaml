name: trilium
description: Hierarchical note-taking application with rich editing
category: productivity
version: "0.93.0"
ports:
  - host: 8082
    container: 8080
    protocol: tcp
    description: Web UI
    value_name: web_port
values:
  - name: web_port
    description: Web UI port
    default: "8082"
  - name: timezone
    description: Timezone
    validation: timezone
dependencies:
  - docker
volumes:
  - name: data
    container: /home/node/trilium-data
    description: Trilium Notes data
health_check:
  url: "http://localhost:{{.web_port}}"
  interval: 30s
backup:
  paths:
    - data
requirements:
  min_ram: 256M
  arch: [amd64, arm64]
