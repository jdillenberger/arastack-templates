name: kavita
description: Self-hosted digital library for reading manga, comics, and ebooks
category: media
version: "0.8.4.2"
ports:
  - host: 5555
    container: 5000
    protocol: tcp
    description: Web UI
    value_name: web_port
values:
  - name: web_port
    description: Web UI port
    default: "5555"
  - name: library_path
    description: Path to manga/ebook library on host
  - name: timezone
    description: Timezone
    default: "UTC"
dependencies:
  - docker
volumes:
  - name: config
    container: /kavita/config
    description: Kavita configuration and database
health_check:
  url: "http://localhost:{{.web_port}}/api/health"
  interval: 30s
backup:
  paths:
    - config
requirements:
  min_ram: 256M
  arch: [amd64, arm64]
