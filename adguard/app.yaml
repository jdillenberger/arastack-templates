name: adguard
description: Network-wide ad and tracker blocking DNS server
category: infra
version: "v0.107.72"
ports:
  - host: 80
    container: 3000
    protocol: tcp
    description: Web UI (setup and admin)
    value_name: web_port
  - host: 53
    container: 53
    protocol: tcp
    description: DNS (TCP)
    value_name: dns_port
  - host: 53
    container: 53
    protocol: udp
    description: DNS (UDP)
    value_name: dns_port
values:
  - name: web_port
    description: Web UI port
    default: "80"
  - name: dns_port
    description: DNS port
    default: "53"
  - name: admin_user
    description: AdGuard admin username
    default: "admin"
  - name: admin_password
    description: AdGuard admin password
    secret: true
  - name: timezone
    description: Timezone
    validation: timezone
dependencies:
  - docker
volumes:
  - name: work
    container: /opt/adguardhome/work
    description: AdGuard working data
  - name: conf
    container: /opt/adguardhome/conf
    description: AdGuard configuration
health_check:
  url: "http://localhost:{{.web_port}}"
  interval: 30s
backup:
  paths:
    - conf
    - work
post_deploy_info:
  credentials: "{{.admin_user}} / ********"
  notes:
    - "AdGuard Home does not support changing the password via the web UI."
requirements:
  min_ram: 128M
  arch: [amd64, arm64, armv7]
