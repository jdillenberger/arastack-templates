name: gotify
description: Self-hosted push notification server
category: infra
version: "2.6.1"
ports:
  - host: 8070
    container: 80
    protocol: tcp
    description: Web UI
    value_name: web_port
values:
  - name: web_port
    description: Web UI port
    default: "8070"
  - name: default_admin_password
    description: Initial admin password
    secret: true
    auto_gen: password
  - name: timezone
    description: Timezone
    validation: timezone
dependencies:
  - docker
volumes:
  - name: data
    container: /app/data
    description: Gotify data
health_check:
  url: "http://localhost:{{.web_port}}"
  interval: 30s
backup:
  paths:
    - data
requirements:
  min_ram: 64M
  arch: [amd64, arm64]
