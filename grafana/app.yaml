name: grafana
description: Monitoring stack with Grafana dashboards and Prometheus metrics
category: infra
version: "11.6.0"
ports:
  - host: 3000
    container: 3000
    protocol: tcp
    description: Grafana Web UI
    value_name: web_port
values:
  - name: web_port
    description: Grafana Web UI port
    default: "3000"
  - name: admin_password
    description: Grafana admin password
    secret: true
    auto_gen: password
  - name: timezone
    description: Timezone
    validation: timezone
dependencies:
  - docker
volumes:
  - name: grafana-data
    container: /var/lib/grafana
    description: Grafana data
  - name: prometheus-data
    container: /prometheus
    description: Prometheus data
health_check:
  url: "http://localhost:{{.web_port}}/api/health"
  interval: 30s
backup:
  paths:
    - grafana-data
    - prometheus-data
routing:
  container_port: 3000
post_deploy_info:
  access_url: "http://localhost:{{.web_port}}"
  credentials: "Username: admin / Password: (generated, see .env)"
  notes:
    - "Prometheus datasource is pre-configured"
    - "Open the 'Arastack Overview' dashboard for server and traefik metrics"
    - "Traefik panels require traefik to be deployed with metrics enabled"
requirements:
  min_ram: 512M
  min_disk: 5G
  arch: [amd64, arm64]
